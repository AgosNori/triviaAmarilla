<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades! - Trivia Amarilla</title>

    <link rel="stylesheet" href="../../estilos/style.css">
    <link rel="stylesheet" href="../../estilos/felicidades.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<body data-personaje="bart">

    <!-- Fondo -->
    <img src="../../assets/TRIVIAAMARILLA/7 - JUEGO BART/1 - Fondo/6 - Fondo Bart.jpg" class="fondoFelicidades"
        alt="fondo">


    <!-- Contenido izquierdo -->
    <div class="contenidoFelicidades">

        <h1 class="tituloFelicidades">¡Felicidades!</h1>

        <p class="textoFelicidades">
            ¡Respondiste todas las preguntas sobre Bart correctamente!<br>
            Puedes elegir continuar con los demás personajes o explorar el menú.
        </p>

        <div class="botonesFinales">

            <a href="../../../../index.html">
                <button class="btnFinal">
                    Volver<br>al menú
                </button>
            </a>

            <a href="../../pages/personajes.html">
                <button class="btnFinal">
                    Explorar a<br>los demás personajes
                </button>
            </a>

        </div>

    </div>

    <!-- GIF / Video celebración -->
    <div class="gifFelicidades">
        <img src="../../assets/TRIVIAAMARILLA/7 - JUEGO BART/3 - GIF/7 - HOMERO - GANO LA TRIVIA.gif" alt="celebración">
    </div>

    <!-- Barra inferior -->
    <div class="barraInferiorPregunta">

        <a href="../../../../index.html">
            <button class="btnInferior">
                <i class="fa-solid fa-house"></i>
            </button>
        </a>

        <div class="contadorVisitas">
            <span id="contador">0000</span>
        </div>

        <button class="btnInferior" id="btnSonido">
            <i class="fa-solid fa-volume-high"></i>
        </button>

    </div>
    <script>
        sessionStorage.removeItem("vidas");
    </script>
    <script>
        window.addEventListener("load", () => {
            const audio = new Audio(
                "../../assets/TRIVIAAMARILLA/Sonidos/3 - Sonido Ganador Todos Los Caminos.mp3"
            );

            audio.play().catch(() => { });
        });
    </script>
    <script>
        const personaje = document.body.dataset.personaje;

        let completados =
            JSON.parse(sessionStorage.getItem("personajesCompletados")) || [];

        if (!completados.includes(personaje)) {

            completados.push(personaje);

            sessionStorage.setItem(
                "personajesCompletados",
                JSON.stringify(completados)
            );
        }
    </script>
    <script src="../../app.js"></script>


</body>

</html>
