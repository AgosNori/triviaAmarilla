<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Simpsons: Trivia Amarilla</title>
    <link rel="stylesheet" href="../../estilos/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body data-personaje="homero">
    <div class="FondoHomero">
        <img src="../../assets/TRIVIAAMARILLA/6 - JUEGO HOMERO/1 - Fondo/1- Fondo Homero.jpg" alt="Fondo Homero"
            class="FondoHomero">
    </div>
    <!-- Pregunta -->
    <div class="pregunta" id="pregunta">
        ¿Cuál es la edad que se menciona con más frecuencia para Homero durante gran parte de la serie clásica?
    </div>
    <div class="panelResultado" id="panelResultado">

        <img id="gifResultado" class="gifResultado" src="" alt="" height="200px">

        <div id="textoResultado" class="textoResultado">
        </div>

    </div>


    <!-- Opciones -->
    <div class="opciones">

        <button class="btnOpcion" data-correcta="false">
            34 años
        </button>

        <button class="btnOpcion" data-correcta="true">
            36 años
        </button>

        <button class="btnOpcion" data-correcta="false">
            38 años
        </button>

        <button class="btnOpcion" data-correcta="false">
            40 años
        </button>

    </div>



    <!-- Vidas -->
    <div class="contenedorJuego">

        <div class="vidas" id="vidas"></div>

         <a id="btnSiguiente" href="#">
            <button class=" siguienteBtn">
                SIGUIENTE ➜
            </button>
        </a>

    </div>

   
    <!-- Barra inferior -->
    <div class="barraInferiorPregunta">

        <a href="../../index.html">
            <button class="btnInferior">
                <i class="fa-solid fa-house"></i>
            </button>
        </a>

        <div class="contadorVisitas">
            <span id="contador">0000</span>
        </div>

        <button class="btnInferior" id="btnSonido">
            <i class="fa-solid fa-volume-high"></i>
        </button>


</body>
<script src="../../app.js"></script>


</html>
