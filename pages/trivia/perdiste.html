<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Perdiste! - Trivia Amarilla</title>

    <link rel="stylesheet" href="../../estilos/style.css">
    <link rel="stylesheet" href="../../estilos/perdiste.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Fondo -->
    <img src="../../assets/TRIVIAAMARILLA/12 - JUEGO TERMINO JUEGO/1 - Fondo/12- Fondo.png" class="fondoSinTiempo"
        alt="fondo" />


    <!-- Contenido izquierdo -->
    <div class="contenidoSinTiempo">

        <h1 class="tituloSinTiempo">¡Perdiste!</h1>

        <p class="textoST">
            Respondiste mal la <br /> pregunta única de la <br /> Trivia Amarilla
        </p>

        <div class="botonesFinalesST">
            <a href="../menuExplicacion.html">
                <button class="btnFinalPerdiste">
                    Volver<br>al menú
                </button>
            </a>

            <a href="preguntaBonus.html">
                <button class="btnFinalPerdiste">
                    Volver<br> a intentar <br> el desafío
                </button>
            </a>

        </div>

    </div>

    <!-- GIF burla -->
    <div class="gifSinTiempo">
        <img src="../../assets/TRIVIAAMARILLA/12 - JUEGO TERMINO JUEGO/3 - GIF/12 - PERDISTE JUEGO.jpg" alt="burla">
    </div>

    <!-- Barra inferior -->
    <div class="barraInferiorPregunta">

        <a href="../../index.html">
            <button class="btnInferior">
                <i class="fa-solid fa-house"></i>
            </button>
        </a>

        <div class="contadorVisitas">
            <span id="contador">0000</span>
        </div>

        <button class="btnInferior" id="btnSonido">
            <i class="fa-solid fa-volume-xmark"></i>
        </button>

    </div>
    <script>
        sessionStorage.removeItem("vidas");
    </script>
    <script>
        let audio;
        let sonidoActivo = true;

        window.addEventListener("load", () => {
            audio = new Audio(
                "../../assets/TRIVIAAMARILLA/Sonidos/4 - Sonido Perdedor Todos los caminos Y Trivia Amarilla.mp3"
            );
            audio.play().catch(() => { });
        });

        document.getElementById("btnSonido").addEventListener("click", () => {
            const icono = document.querySelector("#btnSonido i");
            if (sonidoActivo) {
                audio.pause();
                icono.classList.replace("fa-volume-high", "fa-volume-xmark");
            } else {
                audio.play();
                icono.classList.replace("fa-volume-xmark", "fa-volume-high");
            }
            sonidoActivo = !sonidoActivo;
        });
    </script>
    <script src="../../app.js"></script>

</body>

</html>
