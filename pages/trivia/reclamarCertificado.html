<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado - Trivia Amarilla</title>

    <link rel="stylesheet" href="../../estilos/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Fondo -->
    <img src="../../assets/TRIVIAAMARILLA/12 - JUEGO TERMINO JUEGO/1 - Fondo/12 - Fondo Gano Juego.jpg"
        class="fondoCertificado" alt="Fondo">

    <!-- Botones -->
    <div class="accionesCertificado">

        <a href="../menuExplicacion.html">
            <button class="btnFinalPerdiste">
                VOLVER<br>AL MENÚ
            </button>
        </a>

        <a href="../../assets/TRIVIAAMARILLA/12 - JUEGO TERMINO JUEGO/3 - GIF/12 - CERTIFICADO GANADOR.jpg" download>
            <button class="btnDescargar">
                DESCARGAR<br>CERTIFICADO
            </button>
        </a>

    </div>

    <!-- Certificado -->
    <div class="contenedorCertificado">
        <img src="../../assets/TRIVIAAMARILLA/12 - JUEGO TERMINO JUEGO/3 - GIF/12 - CERTIFICADO GANADOR.jpg"
            alt="Certificado Trivia Amarilla">
    </div>

    <!-- Barra inferior -->
    <div class="barraInferiorPregunta">

        <a href="../../../../index.html">
            <button class="btnInferior">
                <i class="fa-solid fa-house"></i>
            </button>
        </a>

        <div class="contadorVisitas">
            <span id="contador">0000</span>
        </div>

        <button class="btnInferior" id="btnSonido">
            <i class="fa-solid fa-volume-xmark"></i>
        </button>

    </div>
     <script>
        let audio;
        let sonidoActivo = true;

        window.addEventListener("load", () => {
            audio = new Audio(
                "../../assets/TRIVIAAMARILLA/Sonidos/5 - Sonido Ganador Trivia Amarilla.mp3"
            );
            audio.play().catch(() => { });
        });

        document.getElementById("btnSonido").addEventListener("click", () => {
            const icono = document.querySelector("#btnSonido i");
            if (sonidoActivo) {
                audio.pause();
                icono.classList.replace("fa-volume-high", "fa-volume-xmark");
            } else {
                audio.play();
                icono.classList.replace("fa-volume-xmark", "fa-volume-high");
            }
            sonidoActivo = !sonidoActivo;
        });
    </script>
    <script src="../../app.js"></script>

</body>

</html>
